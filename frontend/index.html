<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StrokeGuard | ML Stroke Risk Detection</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#6366f1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="StrokeGuard" />
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2491/2491314.png" />
  
  <!-- Splash Screens for iOS -->
  <link rel="apple-touch-startup-image" href="https://cdn-icons-png.flaticon.com/512/2491/2491314.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <header>
      <nav class="nav-bar">
        <div class="logo">
          <span class="icon">🧠</span>
          <h1>StrokeGuard AI</h1>
        </div>
        <div class="auth-actions">
          <button id="install-btn" class="install-btn hidden">
            <span class="btn-icon">📲</span> Install App
          </button>
          <button id="auth-btn" class="ghost-btn">Login / Sign Up</button>
          <div id="user-profile" class="hidden">
            <span id="username-display">User</span>
            <button id="logout-btn" class="logout-icon">Logout</button>
          </div>
        </div>
      </nav>
      <p class="subtitle">Early Warning System for Stroke Risk Prevention</p>
    </header>

    <main class="container">
      <section class="form-card">
        <form id="risk-form">
          <div class="form-grid">
            <!-- Personal Info -->
            <div class="input-group">
              <label for="gender">Gender</label>
              <select id="gender" name="gender" required>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
              </select>
            </div>

            <div class="input-group">
              <label for="age">Age</label>
              <input type="number" id="age" name="age" min="1" max="120" placeholder="e.g. 45" required />
            </div>

            <!-- Health Factors -->
            <div class="input-group">
              <label for="hypertension">Hypertension</label>
              <select id="hypertension" name="hypertension" required>
                <option value="0">No</option>
                <option value="1">Yes</option>
              </select>
            </div>

            <div class="input-group">
              <label for="heart_disease">Heart Disease</label>
              <select id="heart_disease" name="heart_disease" required>
                <option value="0">No</option>
                <option value="1">Yes</option>
              </select>
            </div>

            <div class="input-group">
              <label for="avg_glucose_level">Avg. Glucose Level (mg/dL)</label>
              <input type="number" step="0.01" id="avg_glucose_level" name="avg_glucose_level" placeholder="e.g. 105.92" required />
            </div>

            <div class="input-group">
              <label for="bmi">Body Mass Index (BMI)</label>
              <input type="number" step="0.1" id="bmi" name="bmi" placeholder="e.g. 28.5" required />
            </div>

            <!-- Lifestyle -->
            <div class="input-group">
              <label for="smoking_status">Smoking Status</label>
              <select id="smoking_status" name="smoking_status" required>
                <option value="never smoked">Never Smoked</option>
                <option value="formerly smoked">Formerly Smoked</option>
                <option value="smokes">Regularly Smokes</option>
                <option value="Unknown">Unknown</option>
              </select>
            </div>

            <div class="input-group">
              <label for="ever_married">Ever Married?</label>
              <select id="ever_married" name="ever_married" required>
                <option value="Yes">Yes</option>
                <option value="No">No</option>
              </select>
            </div>

            <div class="input-group">
              <label for="work_type">Work Type</label>
              <select id="work_type" name="work_type" required>
                <option value="Private">Private Sector</option>
                <option value="Self-employed">Self-employed</option>
                <option value="Govt_job">Government Job</option>
                <option value="children">Student / Child</option>
                <option value="Never_worked">Never Worked</option>
              </select>
            </div>

            <div class="input-group">
              <label for="Residence_type">Residence Type</label>
              <select id="Residence_type" name="Residence_type" required>
                <option value="Urban">Urban</option>
                <option value="Rural">Rural</option>
              </select>
            </div>
          </div>

          <button type="submit" id="submit-btn" class="primary-btn">
            Analyze Stroke Risk
            <span class="btn-shine"></span>
          </button>
        </form>
      </section>

      <section id="result-container" class="result-card hidden">
        <div class="result-header">
          <h2>Analysis Results</h2>
          <div id="risk-badge" class="badge">Low Risk</div>
        </div>

        <div class="gauge-wrapper">
          <div class="risk-gauge">
            <div id="gauge-fill" class="gauge-fill"></div>
            <div class="gauge-text">
              <span id="risk-percentage">0%</span>
              <span class="label">Probability</span>
            </div>
          </div>
        </div>

        <div class="advice-section">
          <h3>Health Recommendation</h3>
          <div id="risk-advice" class="advice-card">
            <!-- Advice populated by JS -->
          </div>
        </div>

        <div class="explanation-section">
          <h3>Key Risk Drivers</h3>
          <ul id="explanation-list" class="driver-list">
            <!-- Drivers populated by JS -->
          </ul>
        </div>

        <button id="reset-btn" class="secondary-btn">New Analysis</button>
      </section>
    </main>

    <div id="loading-overlay" class="loading-overlay hidden">
      <div class="spinner"></div>
      <p>AI Engine Processing...</p>
    </div>

    <div id="auth-modal" class="modal-overlay hidden">
      <div class="modal-card">
        <div class="modal-header">
          <h2 id="modal-title">Welcome Back</h2>
          <button id="close-modal" class="close-btn">&times;</button>
        </div>
        <form id="auth-form">
          <div class="input-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="name@example.com" required />
          </div>
          <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="••••••••" required />
          </div>
          <button type="submit" id="auth-submit" class="primary-btn">Sign In</button>
        </form>
        <p class="modal-footer">
          <span id="auth-switch-text">Don't have an account?</span>
          <button id="auth-switch-btn" class="link-btn">Create one</button>
        </p>
      </div>
    </div>

    <div id="offline-indicator" class="offline-indicator hidden">
      <span class="icon">📡</span> You are currently offline. Some features may be limited.
    </div>
  </div>
  <script type="module" src="/main.js"></script>
</body>
</html>
